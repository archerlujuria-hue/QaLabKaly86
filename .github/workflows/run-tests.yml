name: 🐍 QA Automation - Python a Jira Xray

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests-python:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: ⚙️ Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalar dependencias Python
      - name: 📦 Instalar dependencias Python
        run: pip install pytest

      # 4. Ejecutar pruebas Python (genera results_python.xml de todos los archivos test_*.py)
      - name: 🚀 Ejecutar pruebas Python
        run: pytest tests/test_*.py --junitxml=results_python.xml

      # 5. Subir resultados a Jira Xray de forma automatica
      - name: 📤 Importar resultados a Jira Xray
        uses: mikepenz/xray-action@v3.0.5
        with:
          username: ${{ secrets.XRAY_CLIENT_ID }}
          password: ${{ secrets.XRAY_CLIENT_SECRET }}
          testFormat: "junit"
          testPaths: "results_python.xml"
          xrayCloud: "true"
          projectKey: "SCRUM"
